<svg width="680" height="280" viewBox="0 0 680 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>SPECTRA logo: bifrequency cross</title>
<desc>Five circular peaks arranged in a plus pattern over a faint axis cross with alpha and f labels, paired with the SPECTRA wordmark.</desc>
<style>
.axis-line { stroke: #94a3b8; stroke-width: 0.6; opacity: 0.45; }
.peak-main { fill: #0284c7; }
.peak-side { fill: #0284c7; opacity: 0.7; }
.peak-cross { fill: #ea580c; }
.label-axis { fill: #64748b; font-family: ui-serif, Georgia, 'Times New Roman', serif; font-style: italic; font-size: 13px; }
.wordmark { fill: #0f172a; font-family: ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; }
@media (prefers-color-scheme: dark) {
  .axis-line { stroke: #475569; opacity: 0.65; }
  .peak-main { fill: #38bdf8; }
  .peak-side { fill: #38bdf8; opacity: 0.7; }
  .peak-cross { fill: #fb923c; }
  .label-axis { fill: #94a3b8; }
  .wordmark { fill: #f1f5f9; }
}
</style>
<g transform="translate(290, 35)">
  <line x1="50" y1="6" x2="50" y2="94" class="axis-line"/>
  <line x1="6" y1="50" x2="94" y2="50" class="axis-line"/>
  <circle cx="50" cy="20" r="5" class="peak-cross"/>
  <circle cx="50" cy="80" r="5" class="peak-cross"/>
  <circle cx="20" cy="50" r="5" class="peak-side"/>
  <circle cx="80" cy="50" r="5" class="peak-side"/>
  <circle cx="50" cy="50" r="9" class="peak-main"/>
  <text x="50" y="-2" text-anchor="middle" class="label-axis">α</text>
  <text x="106" y="54" text-anchor="start" class="label-axis">f</text>
</g>
<text x="340" y="215" text-anchor="middle" class="wordmark" font-size="42" font-weight="500" letter-spacing="0.30em">SPECTRA</text>
</svg>
