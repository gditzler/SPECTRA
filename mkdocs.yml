site_name: SPECTRA
site_description: >-
  Rust-backed Python library for realistic RF waveform generation
  with PyTorch DataLoader integration.
site_author: SPECTRA Contributors
repo_url: https://github.com/gditzler/SPECTRA
repo_name: gditzler/SPECTRA

docs_dir: docs
site_dir: site

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - navigation.instant
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: true
            show_bases: true
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            show_root_heading: true
            show_root_full_path: false
            heading_level: 2

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - Key Concepts: getting-started/concepts.md
  - User Guide:
    - Waveforms: user-guide/waveforms.md
    - Multi-Function Emitters: user-guide/multifunction-emitters.md
    - Impairments: user-guide/impairments.md
    - Propagation: user-guide/propagation.md
    - Scene Composition: user-guide/scene-composition.md
    - Datasets: user-guide/datasets.md
    - Transforms & CSP: user-guide/transforms.md
    - File I/O: user-guide/file-io.md
    - Benchmarks: user-guide/benchmarks.md
    - Curriculum & Streaming: user-guide/curriculum-streaming.md
    - Link Simulation: user-guide/link-simulation.md
  - API Reference:
    - spectra.waveforms: api/waveforms.md
    - spectra.impairments: api/impairments.md
    - spectra.scene: api/scene.md
    - spectra.datasets: api/datasets.md
    - spectra.transforms: api/transforms.md
    - spectra.classifiers: api/classifiers.md
    - spectra.benchmarks: api/benchmarks.md
    - spectra.curriculum: api/curriculum.md
    - spectra.streaming: api/streaming.md
    - spectra.utils: api/utils.md
  - Contributing: contributing.md
