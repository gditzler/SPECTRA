name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
      - run: cargo fmt --manifest-path rust/Cargo.toml --all -- --check
      - run: cargo clippy --manifest-path rust/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path rust/Cargo.toml

  python-tests:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-${{ matrix.python-version }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
      - run: |
          python -m venv .venv
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - run: |
          pip install --upgrade pip
          pip install maturin pytest numpy pyyaml zarr scikit-learn h5py
          pip install torch --index-url https://download.pytorch.org/whl/cpu
      - run: maturin develop --release
      - run: pytest tests/ -v
